name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: prisma generate
        run: npx prisma generate
        working-directory: backend
      - name: lint
        run: npm run lint
        working-directory: backend
      - name: typecheck
        run: npm run typecheck
        working-directory: backend
      - name: test
        run: npm test
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: lint
        run: npm run lint
        working-directory: frontend
      - name: typecheck
        run: npm run typecheck
        working-directory: frontend
      - name: test
        run: npm test
        working-directory: frontend
