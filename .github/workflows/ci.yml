name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: prisma generate
        run: npx prisma generate
        working-directory: backend
      - name: lint
        run: npm run lint
        working-directory: backend
      - name: typecheck
        run: npm run typecheck
        working-directory: backend
      - name: debug env
        run: |
          echo "=== Node version ===" && node --version
          echo "=== npm version ===" && npm --version
          echo "=== PWD ===" && pwd
          echo "=== ls node_modules/.bin ===" && ls node_modules/.bin/ | head -20 || echo "no backend .bin"
          echo "=== ls ../node_modules/.bin ===" && ls ../node_modules/.bin/ | head -20 || echo "no root .bin"
          echo "=== jest location ===" && which jest || npx which jest || echo "jest not found"
          echo "=== jose exists ===" && ls node_modules/jose/dist/webapi/index.js 2>/dev/null || ls ../node_modules/jose/dist/webapi/index.js 2>/dev/null || echo "jose not found"
        working-directory: backend
      - name: test
        run: npm test
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: lint
        run: npm run lint
        working-directory: frontend
      - name: typecheck
        run: npm run typecheck
        working-directory: frontend
      - name: debug env
        run: |
          echo "=== Node version ===" && node --version
          echo "=== npm version ===" && npm --version
          echo "=== PWD ===" && pwd
          echo "=== ls node_modules/.bin ===" && ls node_modules/.bin/ | head -20 || echo "no frontend .bin"
          echo "=== ls ../node_modules/.bin ===" && ls ../node_modules/.bin/ | head -20 || echo "no root .bin"
          echo "=== vitest location ===" && which vitest || ls node_modules/.bin/vitest 2>/dev/null || ls ../node_modules/.bin/vitest 2>/dev/null || echo "vitest not found"
        working-directory: frontend
      - name: test
        run: npm test
        working-directory: frontend
